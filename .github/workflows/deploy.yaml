name: Docker Project Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_push_to_docker_hub:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Backend to DockerHub
        uses: docker/build-push-action@v7
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USER }}/docker-project-backend:latest
      - name: Push Frontend to DockerHub
        uses: docker/build-push-action@v7
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USER }}/docker-project-frontend:latest

  trivy-scan:
    name: Scan for vulnerabilities
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    steps:
      - name: Run Trivy vulnerability scanner for Backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ secrets.DOCKER_USER }}/docker-project-backend:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"
      - name: Run Trivy vulnerability scanner for Frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ secrets.DOCKER_USER }}/docker-project-frontend:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

  run-with-docker-compose:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: trivy-scan
    env:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      BACKEND_CPUS: ${{ secrets.BACKEND_CPUS }}
      BACKEND_MEMORY: ${{ secrets.BACKEND_MEMORY }}
      FRONTEND_CPUS: ${{ secrets.FRONTEND_CPUS }}
      FRONTEND_MEMORY: ${{ secrets.FRONTEND_MEMORY }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build via Docker Compose
        uses: hoverkraft-tech/compose-action@v3.0.0
