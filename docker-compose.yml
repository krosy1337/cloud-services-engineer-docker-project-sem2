name: pelmeni

services:
  frontend:
    image: ${DOCKER_USER:-krosy}/docker-project-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - bridge
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    deploy:
      resources:
        limits:
          cpus: ${FRONTEND_CPUS:-1}
          memory: ${FRONTEND_MEMORY:-256M}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  backend:
    image: ${DOCKER_USER:-krosy}/docker-project-backend:latest
    restart: unless-stopped
    expose:
      - "8081"
    networks:
      - bridge
    deploy:
      resources:
        limits:
          cpus: ${BACKEND_CPUS:-1}
          memory: ${BACKEND_MEMORY:-256M}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  bridge:
    driver: bridge
